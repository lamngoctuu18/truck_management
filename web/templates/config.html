<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cấu hình · AI Đếm xe</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .canvas-wrap { position:relative; background:#000; border-radius:10px; overflow:hidden; }
  .canvas-wrap img { width:100%; display:block; }
  .canvas-wrap canvas { position:absolute; inset:0; width:100%; height:100%; cursor:crosshair; }
  .hint { color:var(--text-dim); font-size:13px; margin:10px 0; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px;}
  .field input, .field select { width:100%; }
</style>
</head>
<body>
{% include "_sidebar.html" %}
<main class="main">
  <div class="page-head"><div><h2>Cấu hình</h2><div class="sub">Chọn nguồn video để test và đặt vạch đếm IN/OUT.</div></div></div>

  <div class="card" style="margin-bottom:18px">
    <div class="card-head"><h3>🎬 Nguồn video test</h3><span class="sub">Đang dùng: <b id="curSrc">–</b></span></div>
    <div class="card-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px">
        <div>
          <div class="field"><label>Tải video lên (mp4/avi/mov/mkv)</label>
            <input type="file" id="vfile" accept=".mp4,.avi,.mov,.mkv"></div>
          <button class="primary" onclick="uploadVideo()" style="width:100%">⬆ Tải lên & dùng ngay</button>
          <div id="upmsg" class="hint"></div>
        </div>
        <div>
          <div class="field"><label>Chọn video có sẵn</label>
            <select id="vlist"><option value="">-- chọn --</option></select></div>
          <div class="field"><label>Hoặc nhập webcam (0) / URL rtsp://</label>
            <input id="vsrc" placeholder="0  hoặc  rtsp://..."></div>
          <button class="primary" onclick="switchVideo()" style="width:100%">▶ Chuyển sang nguồn này</button>
          <div id="swmsg" class="hint"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="split">
    <div class="card">
      <div class="card-head"><h3>📹 Đặt vạch trên khung hình</h3></div>
      <div class="card-body">
        <div class="canvas-wrap">
          <img src="/video_feed" id="bg">
          <canvas id="cv"></canvas>
        </div>
        <div class="hint">👉 Bấm và kéo trên hình để vẽ lại vạch. Toạ độ được chuẩn hoá theo tỉ lệ khung hình.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>⚙️ Tham số</h3></div>
      <div class="card-body">
        <div class="field"><label>Camera</label><input id="camName" readonly></div>
        <div class="field"><label>Loại cổng</label><input id="camType" readonly></div>
        <div class="field"><label>Toạ độ vạch (x1,y1,x2,y2 · tỉ lệ 0–1)</label><input id="pts"></div>
        <div class="field"><label>Quy tắc hướng IN</label>
          <select id="rule">
            <option value="down">Xe đi từ trên → dưới là VÀO (down)</option>
            <option value="up">Xe đi từ dưới → trên là VÀO (up)</option>
          </select>
        </div>
        <button class="primary" onclick="save()" style="width:100%">💾 Lưu cấu hình vạch</button>
        <div id="msg" class="hint"></div>
      </div>
    </div>
  </div>
</main>
<script src="/static/app.js"></script>
<script>
const cv = document.getElementById('cv'), bg = document.getElementById('bg');
const ctx = cv.getContext('2d');
let line = [0.05,0.55,0.95,0.55];   // x1,y1,x2,y2 tỉ lệ
let dragging = null;

function resize(){ cv.width = bg.clientWidth; cv.height = bg.clientHeight; draw(); }
bg.onload = resize; window.addEventListener('resize', resize);

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const [x1,y1,x2,y2] = line;
  const p1=[x1*cv.width,y1*cv.height], p2=[x2*cv.width,y2*cv.height];
  ctx.strokeStyle='#ffd000'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(...p1); ctx.lineTo(...p2); ctx.stroke();
  [p1,p2].forEach(p=>{ ctx.fillStyle='#2f81f7'; ctx.beginPath(); ctx.arc(p[0],p[1],8,0,7); ctx.fill(); ctx.strokeStyle='#fff'; ctx.stroke(); });
}
function nearest(mx,my){
  const pts=[[line[0]*cv.width,line[1]*cv.height],[line[2]*cv.width,line[3]*cv.height]];
  for(let i=0;i<2;i++){ if(Math.hypot(pts[i][0]-mx,pts[i][1]-my)<18) return i; }
  return null;
}
function relPos(e){ const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }
cv.addEventListener('mousedown', e=>{ const [mx,my]=relPos(e); dragging = nearest(mx,my); if(dragging===null){ dragging=0; line[0]=mx/cv.width; line[1]=my/cv.height; } });
cv.addEventListener('mousemove', e=>{ if(dragging===null) return; const [mx,my]=relPos(e);
  const i=dragging*2; line[i]=Math.min(1,Math.max(0,mx/cv.width)); line[i+1]=Math.min(1,Math.max(0,my/cv.height)); draw(); syncInput(); });
window.addEventListener('mouseup', ()=> dragging=null);

function syncInput(){ document.getElementById('pts').value = line.map(v=>v.toFixed(3)).join(','); }
document.getElementById('pts').addEventListener('change', e=>{
  const a=e.target.value.split(',').map(Number); if(a.length===4 && a.every(x=>!isNaN(x))){ line=a; draw(); }
});

async function loadCfg(){
  const c = await api('/api/config/line');
  document.getElementById('camName').value = c.camera_name||'';
  document.getElementById('camType').value = c.camera_type||'';
  document.getElementById('rule').value = c.direction_rule||'down';
  if(c.line_points){ line = c.line_points.split(',').map(Number); }
  syncInput(); draw();
}
async function save(){
  const r = await api('/api/config/line', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({line_points: line.map(v=>v.toFixed(3)).join(','), direction_rule: document.getElementById('rule').value})});
  document.getElementById('msg').textContent = r.ok ? '✓ Đã lưu và áp dụng ngay cho pipeline.' : '✗ Lỗi lưu.';
  toast('Cấu hình vạch', 'Đã cập nhật thành công', 'INFO');
}
loadCfg();

// ===== Nguồn video =====
async function loadSources(){
  const d = await api('/api/video/sources');
  document.getElementById('curSrc').textContent = d.current;
  const sel = document.getElementById('vlist');
  sel.innerHTML = '<option value="">-- chọn --</option>' +
    d.videos.map(v=>`<option value="${esc(v.path)}">${esc(v.name)} (${v.size_mb} MB)</option>`).join('');
}
async function uploadVideo(){
  const f = document.getElementById('vfile').files[0];
  if(!f){ toast('Chưa chọn file','Hãy chọn video','WARN'); return; }
  document.getElementById('upmsg').textContent = 'Đang tải lên... (' + Math.round(f.size/1e6) + ' MB)';
  const fd = new FormData(); fd.append('file', f);
  const r = await fetch('/api/video/upload', {method:'POST', body:fd}).then(x=>x.json());
  if(r.ok){
    document.getElementById('upmsg').textContent = '✓ Đã tải lên và chuyển sang video này. Xem khung hình bên dưới.';
    toast('Video', 'Đang xử lý ' + r.path, 'INFO');
    setTimeout(()=>{ reloadFeed(); loadSources(); }, 1500);
  } else {
    document.getElementById('upmsg').textContent = '✗ ' + r.error;
  }
}
async function switchVideo(){
  let src = document.getElementById('vsrc').value.trim() || document.getElementById('vlist').value;
  if(!src){ toast('Chưa chọn nguồn','Chọn video hoặc nhập webcam/RTSP','WARN'); return; }
  const r = await fetch('/api/video/switch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({source:src})}).then(x=>x.json());
  if(r.ok){
    document.getElementById('swmsg').textContent = '✓ Đã chuyển sang: ' + r.source;
    toast('Nguồn video', 'Đã chuyển sang ' + r.source, 'INFO');
    setTimeout(()=>{ reloadFeed(); loadSources(); }, 1500);
  } else {
    document.getElementById('swmsg').textContent = '✗ ' + r.error;
  }
}
function reloadFeed(){
  // buộc trình duyệt tải lại luồng MJPEG với nguồn mới
  document.getElementById('bg').src = '/video_feed?' + Date.now();
}
loadSources();
</script>
</body>
</html>
